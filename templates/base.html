{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Condomínio Estrela</title>

<style>

body{
    background: linear-gradient(135deg,#0f4c5c,#0a2e36);
    min-height:100vh;
}

.main-box{
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.header-title{
    text-align:center;
    margin-bottom:40px;
}

.card-area{
    transition:0.3s;
}

.card-area:hover{
    transform:translateY(-5px);
}

</style>

</head>

<body>

<div class="container py-5">

<div class="main-box">

<div class="header-title">

<h5 class="text-muted">Sistema do Condomínio</h5>
<h1>CONDOMÍNIO ESTRELA</h1>

<a href="{% url 'login' %}" class="btn btn-sm btn-danger mt-2">
Sair
</a>

</div>

{% block content %}{% endblock %}

</div>

</div>

</body>
</html>
